<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
    <title>Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/tracker.css">
    </head>

        <nav>
        <a href="hub.html">Zurück zum Hub</a>
        <h1>Workout loggen</h1>
        </nav>
    <body>

        <main>
        <form id="workout-form">
        <input type="text" id="übung" placeholder="Übung (z.B. Bankdrücken)" required>
        <input type="number" id="gewicht" placeholder="Gewicht (kg)" required>
        <input type="number" id="wiederholungen" placeholder="Wiederholungen" required>
        <button type="submit">+ Satz hinzufügen</button>
        </form>

        <div class="saved sets" id="saved sets">
        <h2>Heutige Sätze</h2>
        <ul id="sets list"></ul>
        </div>

        <button id="finish">Workout abschließen</button>
        </main>

    </body>
</html>
